<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>1688 语义推荐</title>
  <style>
    body { width: 380px; padding: 12px; font-family: sans-serif; }
    input { width: 100%; padding: 8px; margin-bottom: 8px; }
    button { width: 100%; padding: 8px; background: #ff6b00; color: white; border: none; cursor: pointer; }
    button:disabled { background: #ccc; }
    #results { margin-top: 12px; max-height: 400px; overflow-y: auto; }
    .item { border: 1px solid #eee; padding: 8px; margin-bottom: 8px; border-radius: 4px; }
    .item img { width: 60px; height: 60px; object-fit: cover; }
    .item-title { font-weight: bold; font-size: 14px; margin: 4px 0; }
    .item-price { color: #f40; font-size: 16px; }
    .item-shop { color: #666; font-size: 12px; }
    .tag { display: inline-block; background: #ffe4cc; padding: 2px 6px; border-radius: 3px; font-size: 11px; margin-right: 4px; }
  </style>
</head>
<body>
  <h3>🔍 语义推荐搜索</h3>
  <input type="text" id="query" placeholder="输入关键词（如：项链）" />
  <button id="searchBtn">搜索</button>
  <div id="status"></div>
  <div id="results"></div>

  <script src="popup.enhanced.js"></script>
</body>
</html>
