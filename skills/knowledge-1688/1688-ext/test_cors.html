<!DOCTYPE html>
<html>
<head><title>Ollama CORS 测试</title></head>
<body>
  <h3>🧪 Ollama CORS 测试</h3>
  <button onclick="test()">发送测试请求</button>
  <pre id="out"></pre>

  <script>
    async function test() {
      const out = document.getElementById('out');
      out.textContent = '⏳ 发送中...';

      try {
        const resp = await fetch('http://localhost:11434/api/embeddings', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ model: 'nomic-embed-text', prompt: '测试句子' })
        });

        out.textContent = '状态码: ' + resp.status + '\n';
        const json = await resp.json();
        out.textContent += '向量维度: ' + json.embedding.length + '\n';
        out.textContent += '前5项: [' + json.embedding.slice(0,5).join(', ') + ']';
      } catch (err) {
        out.textContent = '❌ 失败: ' + err.message;
      }
    }
  </script>
</body>
</html>
