<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>语义搜索测试</title>
</head>
<body>
  <h1>语义搜索测试</h1>
  <input type="text" id="query" placeholder="输入关键词" value="项链" style="width:300px;font-size:16px;">
  <button onclick="search()" style="font-size:16px;padding:5px 15px;">搜索</button>
  <button onclick="testBM25()" style="font-size:16px;padding:5px 15px;">测试 BM25</button>
  <pre id="result" style="background:#f0f0f0;padding:10px;margin-top:20px;white-space:pre-wrap;"></pre>

  <script>
    const API_BASE = 'http://localhost:11456';

    async function search() {
      const query = document.getElementById('query').value;
      const resultDiv = document.getElementById('result');

      resultDiv.textContent = `搜索中: "${query}"...\n`;

      try {
        const resp = await fetch(`${API_BASE}/api/search/semantic`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ query, limit: 5 })
        });

        const data = await resp.json();
        resultDiv.textContent = JSON.stringify(data, null, 2);
      } catch (err) {
        resultDiv.textContent = '错误: ' + err.message;
      }
    }

    async function testBM25() {
      const query = document.getElementById('query').value;
      const resultDiv = document.getElementById('result');

      try {
        const resp = await fetch(`${API_BASE}/api/keywords/search?q=${encodeURIComponent(query)}&limit=5`);
        const data = await resp.json();
        resultDiv.textContent = 'BM25 结果:\n' + JSON.stringify(data, null, 2);
      } catch (err) {
        resultDiv.textContent = '错误: ' + err.message;
      }
    }
  </script>
</body>
</html>
